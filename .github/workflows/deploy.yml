name: 'Terraform VK Cloud CI/CD'

on:
  push:
    branches: [ "main" ]

# Общие переменные для всех шагов
env:
  TF_VAR_my_ip: ${{ secrets.TF_VAR_my_ip }}
  TF_VAR_project_name: ${{ secrets.TF_VAR_project_name }}
  VK_CLOUD_USERNAME: ${{ secrets.VK_CLOUD_USERNAME }}
  VK_CLOUD_PASSWORD: ${{ secrets.VK_CLOUD_PASSWORD }}
  VK_CLOUD_PROJECT_ID: ${{ secrets.VK_CLOUD_PROJECT_ID }}
  VK_CLOUD_REGION: ${{ secrets.VK_CLOUD_REGION }}

jobs:
  # Первая часть: проверка и создание плана
  terraform_plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -input=false

  # Вторая часть: применение изменений (с ручным подтверждением)
  terraform_apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform_plan # Ждем, пока выполнится проверка и план
    environment: production # Запрашивает одобрение согласно правилам окружения production

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

