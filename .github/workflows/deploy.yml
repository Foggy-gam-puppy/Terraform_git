name: 'Terraform VK Cloud CI/CD'

on:
  push:
    branches: [ "main" ]

# Общие переменные
env:

  TF_VAR_my_ip: ${{ secrets.TF_VAR_MY_IP }}
  TF_VAR_project_name: ${{ secrets.TF_VAR_PROJECT_NAME }}
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
  TF_VAR_key_pair: ${{ secrets.TF_VAR_KEY_PATR }} 
  KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
  
  OS_USERNAME: ${{ secrets.VK_CLOUD_USERNAME }}
  OS_PASSWORD: ${{ secrets.VK_CLOUD_PASSWORD }}
  OS_PROJECT_ID: ${{ secrets.VK_CLOUD_PROJECT_ID }}
  OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
  OS_REGION_NAME: "RegionOne" 

  # Переменные S3
  AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}

jobs:
  terraform_pipeline:
    name: 'Terraform Run'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform
    
    permissions:
      issues: write
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -input=false


    - name: Wait for Approval
      uses: trstringer/manual-approval@v1
      with:
        secret: ${{ secrets.GITHUB_TOKEN }}
        approvers: Foggy-gam-puppy 
        minimum-approvals: 1
        issue-title: "Проверка плана Terraform перед Apply"

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false
