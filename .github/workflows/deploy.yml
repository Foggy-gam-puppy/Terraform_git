name: 'Terraform VK Cloud CI/CD'

on:
  push:
    branches: [ "main" ]

# Общие переменные окружения для всех шагов пайплайна
env:
  # Переменные для самой лабы
  TF_VAR_my_ip: ${{ secrets.TF_VAR_my_ip }}
  TF_VAR_project_name: ${{ secrets.TF_VAR_project_name }}
  
  # Переменные для авторизации провайдера VK Cloud
  VK_CLOUD_USERNAME: ${{ secrets.VK_CLOUD_USERNAME }}
  VK_CLOUD_PASSWORD: ${{ secrets.VK_CLOUD_PASSWORD }}
  VK_CLOUD_PROJECT_ID: ${{ secrets.VK_CLOUD_PROJECT_ID }}
  VK_CLOUD_REGION: ${{ secrets.VK_CLOUD_REGION }}
  
  # Переменные для авторизации удаленного S3 бэкенда (State)
  AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}

jobs:
  terraform_plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -input=false

  terraform_apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform_plan
    environment: production # Запрос ручного подтверждения

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

