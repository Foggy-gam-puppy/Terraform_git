apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-project-deployment
  namespace: my-app-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-project
  template:
    metadata:
      labels:
        app: my-project
    spec:
      containers:
      - name: web-app
        image: nginx:alpine
        ports:
        - containerPort: 80
